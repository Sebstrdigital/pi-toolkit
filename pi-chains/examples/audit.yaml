name: audit
description: Read-only assessment. Scout maps the slice, reviewer judges fitness for purpose. No edits.
steps:
  - role: scout
    prompt: |
      Task: $ORIGINAL

      Map the relevant code for this audit. Stay strictly read-only.
  - role: reviewer
    prompt: |
      Original audit task: $ORIGINAL

      Scout findings:
      $INPUT

      Treat the existing code as the "diff under review". Decide APPROVE / REJECT
      against the task's intent, list quality concerns, and on REJECT enumerate
      concrete required changes for whoever picks this up next.
